defaults:
  - preset: weblike
  - _self_

dim: 3
# 2D: [H, W]   3D: [D, H, W]
grid: [128, 128, 128]
frames: 80
steps_per_frame: 4
seed: 0

# 3D rendering
render_size: 192
n_steps: 128

# Output filenames (resolved relative to hydra run dir)
out_2d_gif: reint_2d.gif
out_mip: reint_3d_mip.gif
out_rm: reint_3d_raymarch.gif
out_mask: reint_3d_volume.npy
out_report: reint_3d_printability.csv
out_stl: reint_3d_volume.stl

# 3D printability sweep (run after the sim)
printability:
  enabled: true
  r_min_voxels: 2
  n_thresholds: 12
  opening_ratio_min: 0.5
  volume_fill_min: 0.05    # reject specks; shape must fill >5% of the cube
  volume_fill_max: 0.35    # reject blocky high-fill shapes (forced-square)
  edt_median_min: 1.5      # typical wall must exceed 1.5 voxels half-thickness
  edt_reward_tau: 2.5      # tanh scale for the diminishing thickness reward
  top_clear_voxels: 1      # top N z-slices must be empty (clear of ceiling)
  bottom_fill_min: 0.1     # base footprint must cover >10% of the bottom face
  bottom_fill_max: 0.8     # ...and <80% (a real base, not a full slab)
  cylinder_penalty_scale: 0.003   # smaller = harsher penalty on corner mass
  overhang_free: 0.03      # overhang fraction forgiven (small overhangs print)
  overhang_penalty_scale: 0.1     # smaller = harsher penalty on overhangs
  export_stl: true
  voxel_size_mm: 0.4   # 128 voxels × 0.4 mm = 51.2 mm cube

# MAP-Elites quality-diversity search (3D only)
mapelites:
  enabled: false
  n_evals: 200
  init_evals: 20         # uniform-random seeds before mutation kicks in
  archive_shape: [8, 5]     # 2-D: edt_median (thickness) × volume_fill
  bd_ranges:
    edt_median: [0.0, 10.0]
    volume_fill: [0.05, 0.35]
  mutation_sigma: 0.1    # fraction of each PARAM_BOUND span
  grid: [64, 64, 64]     # smaller eval grid to keep wall time tractable
  frames: 40
  steps_per_frame: 2
  eval_interval: 10      # evaluate every N frames → ~frames/N candidates/sim
  r_min_voxels: 2
