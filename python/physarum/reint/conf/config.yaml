defaults:
  - preset: weblike
  - _self_

dim: 3
# 2D: [H, W]   3D: [D, H, W]
grid: [128, 128, 128]
frames: 80
steps_per_frame: 4
seed: 0

# 3D rendering
render_size: 192
n_steps: 128

# Output filenames (resolved relative to hydra run dir)
out_2d_gif: reint_2d.gif
out_mip: reint_3d_mip.gif
out_rm: reint_3d_raymarch.gif
out_mask: reint_3d_volume.npy
out_report: reint_3d_printability.csv
out_stl: reint_3d_volume.stl

# 3D printability sweep (run after the sim)
printability:
  enabled: true
  r_min_voxels: 3
  n_thresholds: 12
  opening_ratio_min: 0.9
  volume_fill_min: 0.1     # reject specks; shape must fill >10% of the cube
  volume_fill_max: 0.5     # reject near-solid blocks; must fill <50%
  top_clear_voxels: 1      # top N z-slices must be empty (clear of ceiling)
  bottom_fill_min: 0.1     # base footprint must cover >10% of the bottom face
  bottom_fill_max: 0.8     # ...and <80% (a real base, not a full slab)
  export_stl: true
  voxel_size_mm: 0.4   # 128 voxels × 0.4 mm = 51.2 mm cube

# MAP-Elites quality-diversity search (3D only)
mapelites:
  enabled: false
  n_evals: 200
  init_evals: 20         # uniform-random seeds before mutation kicks in
  archive_shape: [16]       # 1-D archive indexed by edt_median
  bd_ranges:
    edt_median: [0.0, 16.0]
  mutation_sigma: 0.1    # fraction of each PARAM_BOUND span
  grid: [64, 64, 64]     # smaller eval grid to keep wall time tractable
  frames: 40
  steps_per_frame: 2
  r_min_voxels: 3
