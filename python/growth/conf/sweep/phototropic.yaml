# Phototropic growth: hemisphere on a ground plane, ch0=tissue / ch1=light /
# ch2=nutrient. No MLP — diversity comes from light direction, gravity,
# resource diffusion / decay, and ground supply.
#
# Conventions:
#   light_dir       points TOWARD the light source (vertices whose normal
#                   aligns with it receive maximum illumination)
#   light_pos       [-1, -1, z] means "auto-center on x/y of the world"
#   gravity_strength downward force per active vertex
#
# All configs use:
#   shape=hemisphere, growth_mode=phototropic, state_dims=3

name: phototropic

configs:
  # ── A: vary light direction ────────────────────────────────────────────
  - {mlp_seed: 11, light_dir: [0.0, 0.0, 1.0], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 11, light_dir: [1.0, 0.0, 0.6], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 11, light_dir: [-1.0, 0.0, 0.4], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 11, light_dir: [0.7, 0.7, 0.2], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 11, light_dir: [0.0, 1.0, 0.3], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}

  # ── B: vary gravity (overhead light) ───────────────────────────────────
  - {mlp_seed: 23, light_dir: [0.0, 0.0, 1.0], gravity_strength: 0.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 23, light_dir: [0.0, 0.0, 1.0], gravity_strength: 30.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 23, light_dir: [0.0, 0.0, 1.0], gravity_strength: 80.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}

  # ── C: oblique light + gravity (heliotropic with droop) ───────────────
  - {mlp_seed: 31, light_dir: [0.8, 0.0, 0.6], gravity_strength: 40.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 31, light_dir: [0.0, 0.8, 0.6], gravity_strength: 40.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}

  # ── D: vary nutrient diffusion (sharp vs smooth fronts) ───────────────
  - {mlp_seed: 47, resource_diffusion: 0.15, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 47, resource_diffusion: 0.45, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 47, resource_diffusion: 0.85, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}

  # ── E: vary nutrient decay (long-range supply vs starvation gradient) ──
  - {mlp_seed: 53, resource_decay: 0.005, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 53, resource_decay: 0.05, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 53, resource_decay: 0.15, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: apex, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}

  # ── F: vary tissue decay (persistent vs aging meristem) ────────────────
  - {mlp_seed: 67, tissue_decay: 0.01, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 67, tissue_decay: 0.20, light_dir: [0.0, 0.0, 1.0],
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, growth_rate: 6.0, state_dt: 0.08}

  # ── G: point light close to dome (strong falloff → localized burst) ───
  - {mlp_seed: 79, light_dir: [0.0, 0.0, 1.0], light_decay_dist: 100.0,
     light_pos: [-1.0, -1.0, 250.0], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 79, light_dir: [1.0, 0.0, 0.4], light_decay_dist: 80.0,
     light_pos: [600.0, 192.0, 200.0], seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}

  # ── H: combined extremes ──────────────────────────────────────────────
  - {mlp_seed: 89, light_dir: [0.5, 0.5, 0.4], gravity_strength: 50.0,
     resource_diffusion: 0.2, tissue_decay: 0.1, seed_pattern: top_ring,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 89, light_dir: [0.0, 0.0, 1.0], gravity_strength: 60.0,
     resource_diffusion: 0.7, tissue_decay: 0.02, seed_pattern: uniform_low,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}
  - {mlp_seed: 89, light_dir: [0.6, -0.6, 0.5], gravity_strength: 30.0,
     resource_diffusion: 0.3, tissue_decay: 0.07, seed_pattern: apex,
     growth_mode: phototropic, shape: hemisphere, state_dims: 3,
     growth_rate: 6.0, state_dt: 0.08}

  # ── I: vary growth_rate (slow vs fast under same light) ───────────────
  - {mlp_seed: 97, light_dir: [0.0, 0.0, 1.0], growth_rate: 3.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, state_dt: 0.08}
  - {mlp_seed: 97, light_dir: [0.0, 0.0, 1.0], growth_rate: 10.0,
     seed_pattern: top_ring, growth_mode: phototropic, shape: hemisphere,
     state_dims: 3, state_dt: 0.08}
