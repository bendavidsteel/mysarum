# Stratified diverse sweep — varies architecture, seed pattern, mesh, dt, growth_rate.
# Each list entry becomes one (config, mlp_seed) run. Keys not specified
# inherit nca_sweep defaults (mlp_layers=2, hidden_dims=32, state_dims=8,
# mlp_scale=0.5, state_dt=0.07, growth_rate=5.0).

name: stratified

configs:
  # ── A: vary architecture, fix disc/boundary ──
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 1, hidden_dims: 16, state_dims: 4}
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 1, hidden_dims: 32, state_dims: 8}
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 2, hidden_dims: 64, state_dims: 12}
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 3, hidden_dims: 32, state_dims: 8}
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 3, hidden_dims: 64, state_dims: 12}
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary, mlp_layers: 4, hidden_dims: 32, state_dims: 8}
  # ── B: vary seed pattern on disc ──
  - {mlp_seed: 101, shape: disc, seed_pattern: boundary}
  - {mlp_seed: 557, shape: disc, seed_pattern: boundary}
  - {mlp_seed: 101, shape: disc, seed_pattern: multi3}
  - {mlp_seed: 557, shape: disc, seed_pattern: multi3}
  - {mlp_seed: 101, shape: disc, seed_pattern: multi7}
  - {mlp_seed: 557, shape: disc, seed_pattern: multi7}
  - {mlp_seed: 101, shape: disc, seed_pattern: gradient_z}
  - {mlp_seed: 557, shape: disc, seed_pattern: gradient_z}
  - {mlp_seed: 101, shape: disc, seed_pattern: ring}
  - {mlp_seed: 557, shape: disc, seed_pattern: ring}
  # ── C: vary seed pattern on sphere ──
  - {mlp_seed: 109, shape: sphere, seed_pattern: random}
  - {mlp_seed: 449, shape: sphere, seed_pattern: random}
  - {mlp_seed: 109, shape: sphere, seed_pattern: antipodal}
  - {mlp_seed: 449, shape: sphere, seed_pattern: antipodal}
  - {mlp_seed: 109, shape: sphere, seed_pattern: multi3}
  - {mlp_seed: 449, shape: sphere, seed_pattern: multi3}
  - {mlp_seed: 109, shape: sphere, seed_pattern: multi7}
  - {mlp_seed: 449, shape: sphere, seed_pattern: multi7}
  - {mlp_seed: 109, shape: sphere, seed_pattern: gradient_z}
  - {mlp_seed: 449, shape: sphere, seed_pattern: gradient_z}
  - {mlp_seed: 109, shape: sphere, seed_pattern: ring}
  - {mlp_seed: 449, shape: sphere, seed_pattern: ring}
  # ── D: vary state_dt ──
  - {mlp_seed: 211, shape: disc, seed_pattern: boundary, state_dt: 0.04}
  - {mlp_seed: 211, shape: disc, seed_pattern: boundary, state_dt: 0.10}
  # ── E: vary growth_rate ──
  - {mlp_seed: 109, shape: sphere, seed_pattern: random, growth_rate: 3.0}
  - {mlp_seed: 109, shape: sphere, seed_pattern: random, growth_rate: 8.0}
  # ── F: small deep nets ──
  - {mlp_seed: 823, shape: disc, seed_pattern: boundary, mlp_layers: 3, hidden_dims: 12, state_dims: 6, mlp_scale: 0.6}
  - {mlp_seed: 263, shape: disc, seed_pattern: boundary, mlp_layers: 3, hidden_dims: 12, state_dims: 6, mlp_scale: 0.6}
